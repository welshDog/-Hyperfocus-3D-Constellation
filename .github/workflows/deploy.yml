name: 🚀 Deploy Hyperfocus 3D Constellation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: 🧪 Quality Assurance
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    - name: 📦 Install Dependencies
      run: npm ci
    - name: 📦 Cache CDN Assets
      run: npm run cache:cdn
    - name: 🎯 Lint
      run: npm run lint
    - name: 🔍 Selector Contract
      run: npm run lint:selectors
    - name: ✅ Unit Tests
      run: npm run test
    - name: ✅ Coverage Gate
      run: npm run test:coverage
    - name: ✅ Contract Tests
      run: npm run test:contract
    - name: ✅ OpenAPI Validation
      run: npm run docs:validate

  e2e:
    name: 🎭 E2E Sharded
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        shard: [1, 2, 3]
        total: [3]
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    - name: 📦 Install Dependencies
      run: npm ci
    - name: 📦 Cache CDN Assets
      run: npm run cache:cdn
    - name: 🎭 Install Playwright
      run: npx playwright install --with-deps
    - name: 🌐 Start Local Server
      run: npm run dev &
    - name: ⏱️ Wait for Server
      run: npx wait-on http://localhost:8090
    - name: 🧪 Run Sharded E2E
      run: npx playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}

  performance:
    name: ⚡ Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    - name: 📦 Install Dependencies
      run: npm ci
    - name: 📦 Cache CDN Assets
      run: npm run cache:cdn
    - name: 🌐 Start Local Server
      run: npm run dev &
    - name: ⏱️ Wait for Server
      run: npx wait-on http://localhost:8080
    - name: 📊 Lighthouse
      uses: treosh/lighthouse-ci-action@v10
      with:
        urls: |
          http://localhost:8090
        uploadArtifacts: true
        temporaryPublicStorage: true

  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, e2e, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: 📥 Checkout Repository  
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🏗️ Build Project
      run: npm run build
      
    - name: 📄 Setup Pages
      uses: actions/configure-pages@v4
      
    - name: 📤 Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # 🎉 Success Notification Job
  notify-success:
    name: 🎉 Success Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    
    steps:
    - name: 🎉 Deployment Success
      run: |
        echo "🚀 Hyperfocus 3D Constellation deployed successfully!"
        echo "🌐 Live at: https://welshdog.github.io/-Hyperfocus-3D-Constellation/"
        echo "⭐ The galaxy is updated and ready to explore!"

  # 💜 Community Update Job
  community-update:
    name: 💜 Community Update
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success() && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 💬 Discord Notification
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: |
          🌌 **Hyperfocus 3D Constellation Updated!** 
          
          ✨ New changes deployed to the galaxy
          🚀 Live at: https://welshdog.github.io/-Hyperfocus-3D-Constellation/
          💜 Built by neurodivergent minds, for everyone who thinks differently
          
          Ready to explore the updated constellation? 🌟

env:
  # 🌍 Environment Variables
  NODE_ENV: production
  CI: true
